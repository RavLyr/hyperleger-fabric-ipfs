# Docker Compose runtime migration for the existing manually-created Fabric network.
# This compose uses each node's real config directory instead of the template
# fabric/config directory, and it mounts only the ledger folder each service owns.
# It does not run Fabric CA, regenerate MSP/TLS assets, or reset ledger data.

x-orderer-env: &orderer-env
  FABRIC_LOGGING_SPEC: ${FABRIC_LOGGING_SPEC}
  ORDERER_GENERAL_BOOTSTRAPMETHOD: none
  ORDERER_CHANNELPARTICIPATION_ENABLED: "true"
  # Existing orderer.yaml files listen on 127.0.0.1. Containers need 0.0.0.0
  # so Docker can publish gRPC/admin/operations ports to the host.
  ORDERER_GENERAL_LISTENADDRESS: 0.0.0.0
  ORDERER_GENERAL_TLS_ENABLED: "true"
  ORDERER_GENERAL_TLS_CLIENTAUTHREQUIRED: "false"
  # Admin TLS follows the existing per-OSN orderer.yaml configuration:
  # admin TLS material is the peer0 admin TLS identity, not each OSN TLS identity.
  ORDERER_ADMIN_TLS_ENABLED: "true"
  ORDERER_ADMIN_TLS_CLIENTAUTHREQUIRED: "true"
  ORDERER_GENERAL_LOCALMSPID: OrdererOrg1MSP
  ORDERER_ADMIN_TLS_CERTIFICATE: /var/hyperledger/crypto/peerOrganizations/org1.example.com/peers/peer0.org1.ravly.com/tls/signcerts/cert.pem
  ORDERER_ADMIN_TLS_PRIVATEKEY: /var/hyperledger/crypto/peerOrganizations/org1.example.com/peers/peer0.org1.ravly.com/tls/keystore/org1admin-tls-key.pem
  ORDERER_ADMIN_TLS_CLIENTROOTCAS: "[/var/hyperledger/crypto/peerOrganizations/org1.example.com/peers/peer0.org1.ravly.com/msp/tls/tls-ca-cert.pem]"

x-orderer-common: &orderer-common
  image: hyperledger/fabric-orderer:${FABRIC_VERSION}
  volumes:
    - ./organization:/var/hyperledger/crypto:ro
  networks:
    fabric:

x-peer-env: &peer-env
  FABRIC_LOGGING_SPEC: ${FABRIC_LOGGING_SPEC}
  CORE_PEER_LOCALMSPID: Org1MSP
  CORE_PEER_ADDRESS: peer1org1.example.com:7051
  CORE_PEER_TLS_ENABLED: "true"
  CORE_PEER_TLS_ROOTCERT_FILE: /var/hyperledger/crypto/peerOrganizations/org1.example.com/peers/peer1.org1.ravly.com/tls/cacerts/localhost-7054.pem

services:
  ca_org1: 
    image: hyperledger/fabric-ca:1.5.7
    container_name: ca_org1
    hostname: ca.org1.example.com
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-org1
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=7054
      - FABRIC_CA_SERVER_CSR_HOSTS=ca.org1.example.com,localhost
    ports:
      - "7054:7054"
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ./organization/ca-deployments/fabric-ca-server-org1:/etc/hyperledger/fabric-ca-server
    networks:
      fabric:
        aliases:
          - ca.org1.example.com 
  ca_org2:
    image: hyperledger/fabric-ca:1.5.7
    container_name: ca_org2
    hostname: ca.org2.example.com
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-org2
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=9054
      - FABRIC_CA_SERVER_CSR_HOSTS=ca.org2.example.com,localhost
    ports:
      - "9054:9054"
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ./organization/ca-deployments/org2-ca-server:/etc/hyperledger/fabric-ca-server
      - ./organization/ordererOrganizations:/etc/hyperledger/fabric-ca-server/ordererOrganizations
      - ./organization:/etc/hyperledger/peerOrganization
    networks:
      fabric:
        aliases:
          - ca.org2.example.com  

  tls_ca:
    image: hyperledger/fabric-ca:1.5.7
    container_name: tls_ca
    hostname: tls-ca.example.com
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=tls-ca
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      # Kita bedakan port internal & eksternal menjadi 8054 agar tidak bentrok dengan Org CA
      - FABRIC_CA_SERVER_PORT=8054
      - FABRIC_CA_SERVER_CSR_HOSTS=tls-ca.example.com,localhost
    ports:
      - "8054:8054"
    command: sh -c 'fabric-ca-server start -b tlsadmin:tlsadminpw -d'
    volumes:
      # Data disimpan terpisah namun tetap dalam cluster ca-deployments lu
      - ./organization/ca-deployments/fabric-ca-server-tls:/etc/hyperledger/fabric-ca-server
    networks:
      fabric:
        aliases:
          - tls-ca.example.com

  osn1:
    <<: *orderer-common
    container_name: osn1.example.com
    hostname: osn1.example.com
    environment:
      <<: *orderer-env
      # This OSN loads fabric/config/orderer-config/osnorg1/osn0/orderer.yaml.
      ORDERER_GENERAL_LOCALMSPDIR: /var/hyperledger/crypto/ordererOrganizations/ordererOrg1.example.com/ordering-service-nodes/osn1.ordererOrg1.example.com/msp
      ORDERER_GENERAL_LISTENPORT: 7050
      ORDERER_OPERATIONS_LISTENADDRESS: 0.0.0.0:8543
      ORDERER_ADMIN_LISTENADDRESS: 0.0.0.0:9443
      ORDERER_GENERAL_TLS_PRIVATEKEY: /var/hyperledger/crypto/ordererOrganizations/ordererOrg1.example.com/ordering-service-nodes/osn1.ordererOrg1.example.com/tls/keystore/orderer1-tls-key.pem
      ORDERER_GENERAL_TLS_CERTIFICATE: /var/hyperledger/crypto/ordererOrganizations/ordererOrg1.example.com/ordering-service-nodes/osn1.ordererOrg1.example.com/tls/signcerts/cert.pem
      ORDERER_GENERAL_TLS_ROOTCAS: "[/var/hyperledger/crypto/ordererOrganizations/ordererOrg1.example.com/ordering-service-nodes/osn1.ordererOrg1.example.com/tls/cacerts/localhost-7054.pem]"
      ORDERER_FILELEDGER_LOCATION: /var/hyperledger/production/orderer/osno
    volumes:
      - ./fabric/config/orderer-config/osnorg1/osn0:/etc/hyperledger/fabric:ro
      - ./organization:/var/hyperledger/crypto:ro
      - /var/hyperledger/production/orderer/osno:/var/hyperledger/production/orderer/osno
      - /var/hyperledger/production/orderer/etcdraft/wal/org1/osn0:/var/hyperledger/production/orderer/etcdraft/wal/org1/osn0
      - /var/hyperledger/production/orderer/etcdraft/snapshot/org1/osn0:/var/hyperledger/production/orderer/etcdraft/snapshot/org1/osn0
    ports:
      - "7050:7050"
      - "8543:8543"
      - "9443:9443"
    networks:
      fabric:
        aliases:
          - osn1.example.com

  osn2:
    <<: *orderer-common
    container_name: osn2.example.com
    hostname: osn2.example.com
    environment:
      <<: *orderer-env
      # This OSN loads fabric/config/orderer-config/osnorg1/osn1/orderer.yaml.
      ORDERER_GENERAL_LOCALMSPDIR: /var/hyperledger/crypto/ordererOrganizations/ordererOrg1.example.com/ordering-service-nodes/osn2.ordererOrg1.example.com/msp
      ORDERER_GENERAL_LISTENPORT: 8050
      ORDERER_OPERATIONS_LISTENADDRESS: 0.0.0.0:8443
      ORDERER_ADMIN_LISTENADDRESS: 0.0.0.0:9543
      ORDERER_GENERAL_TLS_PRIVATEKEY: /var/hyperledger/crypto/ordererOrganizations/ordererOrg1.example.com/ordering-service-nodes/osn2.ordererOrg1.example.com/tls/keystore/org1-osn1-key.pem
      ORDERER_GENERAL_TLS_CERTIFICATE: /var/hyperledger/crypto/ordererOrganizations/ordererOrg1.example.com/ordering-service-nodes/osn2.ordererOrg1.example.com/tls/signcerts/cert.pem
      ORDERER_GENERAL_TLS_ROOTCAS: "[/var/hyperledger/crypto/ordererOrganizations/ordererOrg1.example.com/ordering-service-nodes/osn2.ordererOrg1.example.com/tls/cacerts/localhost-7054.pem]"
      ORDERER_FILELEDGER_LOCATION: /var/hyperledger/production/orderer/osn1
    volumes:
      - ./fabric/config/orderer-config/osnorg1/osn1:/etc/hyperledger/fabric:ro
      - ./organization:/var/hyperledger/crypto:ro
      - /var/hyperledger/production/orderer/osn1:/var/hyperledger/production/orderer/osn1
      - /var/hyperledger/production/orderer/etcdraft/wal/org1/osn1:/var/hyperledger/production/orderer/etcdraft/wal/org1/osn1
      - /var/hyperledger/production/orderer/etcdraft/snapshot/org1/osn1:/var/hyperledger/production/orderer/etcdraft/snapshot/org1/osn1
    ports:
      - "8050:8050"
      - "8443:8443"
      - "9543:9543"
    networks:
      fabric:
        aliases:
          - osn2.example.com

  osn3:
    <<: *orderer-common
    container_name: osn3.example.com
    hostname: osn3.example.com
    environment:
      <<: *orderer-env
      # This OSN loads fabric/config/orderer-config/osnorg1/osn2/orderer.yaml.
      ORDERER_GENERAL_LOCALMSPDIR: /var/hyperledger/crypto/ordererOrganizations/ordererOrg1.example.com/ordering-service-nodes/osn3.ordererOrg1.example.com/msp
      ORDERER_GENERAL_LISTENPORT: 9050
      ORDERER_OPERATIONS_LISTENADDRESS: 0.0.0.0:8643
      ORDERER_ADMIN_LISTENADDRESS: 0.0.0.0:9643
      ORDERER_GENERAL_TLS_PRIVATEKEY: /var/hyperledger/crypto/ordererOrganizations/ordererOrg1.example.com/ordering-service-nodes/osn3.ordererOrg1.example.com/tls/keystore/osn2-tls-key.pem
      ORDERER_GENERAL_TLS_CERTIFICATE: /var/hyperledger/crypto/ordererOrganizations/ordererOrg1.example.com/ordering-service-nodes/osn3.ordererOrg1.example.com/tls/signcerts/cert.pem
      ORDERER_GENERAL_TLS_ROOTCAS: "[/var/hyperledger/crypto/ordererOrganizations/ordererOrg1.example.com/ordering-service-nodes/osn3.ordererOrg1.example.com/tls/cacerts/localhost-7054.pem]"
      ORDERER_FILELEDGER_LOCATION: /var/hyperledger/production/orderer/osn2
    volumes:
      - ./fabric/config/orderer-config/osnorg1/osn2:/etc/hyperledger/fabric:ro
      - ./organization:/var/hyperledger/crypto:ro
      - /var/hyperledger/production/orderer/osn2:/var/hyperledger/production/orderer/osn2
      - /var/hyperledger/production/orderer/etcdraft/wal/org1/osn3:/var/hyperledger/production/orderer/etcdraft/wal/org1/osn3
      - /var/hyperledger/production/orderer/etcdraft/snapshot/org1/osn3:/var/hyperledger/production/orderer/etcdraft/snapshot/org1/osn3
    ports:
      - "9050:9050"
      - "8643:8643"
      - "9643:9643"
    networks:
      fabric:
        aliases:
          - osn3.example.com

  peer1: # punya org1 
    image: hyperledger/fabric-peer:${FABRIC_VERSION}
    container_name: peer1org1.example.com
    hostname: peer1org1.example.com
    depends_on:
      - osn1
      - osn2
      - osn3
    environment:
      <<: *peer-env
      # This peer loads fabric/config/peers/org1peer/peer0/core.yaml.
      CORE_PEER_ID: peer1org1.example.com
      CORE_PEER_LISTENADDRESS: 0.0.0.0:7051
      CORE_PEER_CHAINCODELISTENADDRESS: 0.0.0.0:7052
      CORE_PEER_CHAINCODEADDRESS: peer1org1.example.com:7052
      CORE_PEER_GOSSIP_BOOTSTRAP: peer1org1.example.com:7051
      CORE_PEER_GOSSIP_ENDPOINT: peer1org1.example.com:7051
      CORE_PEER_GOSSIP_EXTERNALENDPOINT: peer1org1.example.com:7051
      CORE_PEER_MSPCONFIGPATH: /var/hyperledger/crypto/peerOrganizations/org1.example.com/peers/peer1.org1.ravly.com/msp
      CORE_PEER_TLS_CLIENTAUTHREQUIRED: "false"
      CORE_PEER_TLS_CERT_FILE: /var/hyperledger/crypto/peerOrganizations/org1.example.com/peers/peer1.org1.ravly.com/tls/signcerts/cert.pem
      CORE_PEER_TLS_KEY_FILE: /var/hyperledger/crypto/peerOrganizations/org1.example.com/peers/peer1.org1.ravly.com/tls/keystore/peer0-tls-cert.pem
      CORE_PEER_TLS_CLIENTROOTCAS_FILES: /var/hyperledger/crypto/peerOrganizations/org1.example.com/peers/peer1.org1.ravly.com/tls/cacerts/localhost-7054.pem
      CORE_PEER_FILESYSTEMPATH: /var/hyperledger/production/org1/peer0
      CORE_OPERATIONS_LISTENADDRESS: 0.0.0.0:9453
      # CORE_VM_ENDPOINT tells the peer to use the host Docker daemon for Fabric's
      # default Docker chaincode builder.
      CORE_VM_ENDPOINT: unix:///var/run/docker.sock
      # CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE puts chaincode containers on the same
      # Docker network as the peer so chaincode can connect to peer1org1.example.com:7052.
      CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE: fabric_migration_net
    volumes:
      - ./fabric/config/peers/org1peer/peer0:/etc/hyperledger/fabric:ro
      - ./organization:/var/hyperledger/crypto:ro
      - /var/hyperledger/production/org1/peer0:/var/hyperledger/production/org1/peer0
      - /var/hyperledger/production/snapshots/org1/peer0:/var/hyperledger/production/snapshots/org1/peer0
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "7051:7051"
      - "7052:7052"
      - "9453:9453"
    networks:
      fabric:
        aliases:
          - peer1org1.example.com

  peer2: # punya org2
    image: hyperledger/fabric-peer:${FABRIC_VERSION}
    container_name: peer2org2.example.com
    hostname: peer2org2.example.com
    depends_on:
      - osn1
      - osn2
      - osn3
    environment:
      <<: *peer-env
      CORE_PEER_LOCALMSPID: Org2MSP
      CORE_PEER_ADDRESS: peer2org2.example.com:8051
      CORE_PEER_TLS_ROOTCERT_FILE: /var/hyperledger/crypto/peerOrganizations/org2.example.com/peers/peer2.org2.ravly.com/tls/cacerts/localhost-8054.pem
      # This peer loads fabric/config/peers/org2peer/peer0/core.yaml.
      CORE_PEER_ID: peer2org2.example.com
      CORE_PEER_LISTENADDRESS: 0.0.0.0:8051
      CORE_PEER_CHAINCODELISTENADDRESS: 0.0.0.0:8052
      CORE_PEER_CHAINCODEADDRESS: peer2org2.example.com:8052
      CORE_PEER_GOSSIP_BOOTSTRAP: peer2org2.example.com:8051
      CORE_PEER_GOSSIP_ENDPOINT: peer2org2.example.com:8051
      CORE_PEER_GOSSIP_EXTERNALENDPOINT: peer2org2.example.com:8051
      CORE_PEER_MSPCONFIGPATH: /var/hyperledger/crypto/peerOrganizations/org2.example.com/peers/peer2.org2.ravly.com/msp
      CORE_PEER_TLS_CLIENTAUTHREQUIRED: "false"
      CORE_PEER_TLS_CERT_FILE: /var/hyperledger/crypto/peerOrganizations/org2.example.com/peers/peer2.org2.ravly.com/tls/signcerts/cert.pem
      CORE_PEER_TLS_KEY_FILE: /var/hyperledger/crypto/peerOrganizations/org2.example.com/peers/peer2.org2.ravly.com/tls/keystore/peer2-tls-cert.pem
      CORE_PEER_TLS_CLIENTROOTCAS_FILES: /var/hyperledger/crypto/peerOrganizations/org2.example.com/peers/peer2.org2.ravly.com/tls/tlscacerts/tls-ca-org2-example-com-9054-ca-org2.pem
      CORE_PEER_FILESYSTEMPATH: /var/hyperledger/production/org2/peer2
      CORE_OPERATIONS_LISTENADDRESS: 0.0.0.0:9454
      # CORE_VM_ENDPOINT tells the peer to use the host Docker daemon for Fabric's
      # default Docker chaincode builder.
      CORE_VM_ENDPOINT: unix:///var/run/docker.sock
      # CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE puts chaincode containers on the same
      # Docker network as the peer so chaincode can connect to peer2org2.example.com:7052.
      CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE: fabric_migration_net
    volumes:
      - ./fabric/config/peers/org2peer/peer2:/etc/hyperledger/fabric:ro
      - ./organization:/var/hyperledger/crypto:ro
      - /var/hyperledger/production/org2/peer2:/var/hyperledger/production/org2/peer2
      - /var/hyperledger/production/snapshots/org2/peer2:/var/hyperledger/production/snapshots/org2/peer2
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8051:8051"
      - "8052:8052"
      - "9454:9454"
    networks:
      fabric:
        aliases:
          - peer2org2.example.com


  cli:
    image: hyperledger/fabric-tools:latest
    container_name: cli.example.com
    hostname: cli.example.com
    tty: true
    stdin_open: true
    depends_on:
      - peer1
      - peer2
    environment:
      <<: [*peer-env, *orderer-env]
      OSN_TLS_CA_ROOT_CERT: /var/hyperledger/crypto/peerOrganizations/org1.example.com/peers/peer0.org1.ravly.com/msp/tls/tls-ca-cert.pem
      ADMIN_TLS_SIGN_CERT: /var/hyperledger/crypto/ca-deployments/fabric-ca-client/tls-ca/tlsadmin/msp/signcerts/cert.pem      
      ADMIN_TLS_PRIVATE_KEY: /var/hyperledger/crypto/ca-deployments/fabric-ca-client/tls-ca/tlsadmin/msp/keystore/key.pem
      # This is the existing admin MSP in your current crypto tree.
      CORE_PEER_MSPCONFIGPATH: /var/hyperledger/crypto/peerOrganizations/org1.example.com/peers/peer0.org1.ravly.com/msp
      ORDERER_CA: /var/hyperledger/crypto/ordererOrganizations/ordererOrg1.example.com/ordering-service-nodes/osn1.ordererOrg1.example.com/tls/cacerts/localhost-7054.pem
    volumes:
      - ./fabric/config/peers/org1peer/peer0:/etc/hyperledger/fabric:ro
      - ./organization:/var/hyperledger/crypto:ro
      - ./fabric/chaincode-go:/opt/gopath/src/chaincode/chaincode-go:ro
      - ./chaincode-packages:/opt/chaincode-packages
      - ./fabric/config/channel-conf/:/opt/gopath/src/github.com/hyperledger/fabric/peer/channel-artifacts
    networks:
      fabric:
        aliases:
          - cli.example.com

networks:
  fabric:
    name: fabric_migration_net
