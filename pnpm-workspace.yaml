packages:
  - "apps/*"
  - "packages/*"

allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  bcrypt: true
  esbuild: true
  pkcs11js: true
  prisma: true
  protobufjs: true
  sharp: true
  unrs-resolver: true

onlyBuiltDependencies:
  - "@prisma/client"
  - "@prisma/engines"
  - "bcrypt"
  - "esbuild"
  - "pkcs11js"
  - "prisma"
  - "protobufjs"
  - "sharp"
  - "unrs-resolver"
